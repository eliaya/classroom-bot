name: classroom-bot

x-logging: &default-logging
  driver: json-file
  options:
    max-size: "10m"
    max-file: "3"

services:
  bot:
    profiles: [prod]
    build:
      context: .
      dockerfile: Dockerfile.bot
    container_name: classroom-discord-sync
    restart: unless-stopped
    env_file:
      - .env
    volumes:
      - ./data:/app/data
      - ./credentials:/app/credentials
    logging: *default-logging

  web:
    profiles: [prod]
    build:
      context: .
      dockerfile: Dockerfile.web
    container_name: classroom-web
    restart: unless-stopped
    ports:
      - "127.0.0.1:8080:80"
    logging: *default-logging

  bot-dev:
    profiles: [dev]
    build:
      context: .
      dockerfile: Dockerfile.bot
    container_name: classroom-discord-sync-dev
    restart: unless-stopped
    env_file:
      - .env
    volumes:
      - ./src:/app/src
      - ./tests:/app/tests
      - ./data:/app/data
      - ./credentials:/app/credentials
    command: ["python", "-m", "src.main"]

  web-dev:
    profiles: [dev]
    image: node:22-alpine
    container_name: classroom-web-dev
    working_dir: /app
    restart: unless-stopped
    environment:
      APP_URL: "http://localhost:5173"
    ports:
      - "127.0.0.1:5173:5173"
    volumes:
      - ./web:/app
      - web_node_modules:/app/node_modules
    command: sh -c "rm -rf node_modules/.vite && npm install && npm run dev -- --host 0.0.0.0 --port 5173 --strictPort --force"

volumes:
  web_node_modules: