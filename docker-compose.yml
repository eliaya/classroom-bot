name: classroom-bot

x-logging: &default-logging
  driver: json-file
  options:
    max-size: "10m"
    max-file: "3"

services:
  api:
    build:
      context: .
      dockerfile: docker/api/Dockerfile
    container_name: classroom-api
    restart: unless-stopped
    env_file:
      - .env
    environment:
      # API_PORT in .env is the *host* port. Inside the container the API must
      # stay on 8000 — nginx, the bot, and the port mapping all expect 8000.
      - API_PORT=8000
    volumes:
      - app_data:/app/data
      - ./credentials:/app/credentials
    ports:
      - ${API_PORT}:8000
    logging: *default-logging

  bot:
    build:
      context: .
      dockerfile: docker/bot/Dockerfile
    container_name: discord-bot
    restart: unless-stopped
    env_file:
      - .env
    environment:
      # Bot reads Classroom data from the API service over the Docker network
      # (not Google directly). Overrides the localhost default in .env/config.
      - API_BASE_URL=http://api:8000
    volumes:
      - app_data:/app/data
      - ./credentials:/app/credentials
    depends_on:
      - api
    logging: *default-logging

  web:
    build:
      context: .
      dockerfile: docker/web/Dockerfile
    container_name: classroom-web
    restart: unless-stopped
    ports:
      - ${HTTP_PORT}:80
    depends_on:
      - api
    logging: *default-logging

volumes:
  app_data:
