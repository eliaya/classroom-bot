services:
  bot:
    image: ${BOT_IMAGE:-classroom-bot:local}
    container_name: classroom-discord-sync
    restart: unless-stopped
    env_file:
      - classroom-discord-sync/.env
    volumes:
      - ./classroom-discord-sync/data:/app/data
      - ./classroom-discord-sync/credentials:/app/credentials
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  web:
    image: ${WEB_IMAGE:-classroom-web:local}
    container_name: classroom-web
    restart: unless-stopped
    ports:
      - "127.0.0.1:8080:80"
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
