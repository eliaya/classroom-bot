name: CI/CD

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install Python dependencies
        run: python -m pip install -r requirements.txt

      - name: Run Python tests
        env:
          DISCORD_BOT_TOKEN: test_discord_bot_token
          PYTHONPATH: .
        run: pytest -q tests

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install Node dependencies
        working-directory: web
        run: npm ci

      - name: Type-check web app
        working-directory: web
        run: npm run lint

      - name: Build web app
        working-directory: web
        run: npm run build

  build:
    name: Build and Push Images
    runs-on: ubuntu-latest
    needs: test
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GHCR
        run: echo "${{ github.token }}" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin

      - name: Build and push images
        shell: bash
        run: |
          set -euo pipefail
          image_prefix="ghcr.io/${GITHUB_REPOSITORY,,}"

          docker build \
            -f docker/Dockerfile.bot \
            -t "$image_prefix/classroom-bot:${GITHUB_SHA}" \
            -t "$image_prefix/classroom-bot:main" \
            .

          docker build \
            -f docker/Dockerfile.web \
            -t "$image_prefix/classroom-web:${GITHUB_SHA}" \
            -t "$image_prefix/classroom-web:main" \
            .

          docker push "$image_prefix/classroom-bot:${GITHUB_SHA}"
          docker push "$image_prefix/classroom-bot:main"
          docker push "$image_prefix/classroom-web:${GITHUB_SHA}"
          docker push "$image_prefix/classroom-web:main"

  deploy:
    name: Deploy Production
    runs-on:
      - self-hosted
      - classroom-prod
    needs: build
    environment: production
    steps:
      - name: Checkout without cleaning server secrets
        uses: actions/checkout@v4
        with:
          clean: false

      - name: Log in to GHCR
        run: echo "${{ github.token }}" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin

      - name: Pull images and restart services
        shell: bash
        run: |
          set -euo pipefail
          image_prefix="ghcr.io/${GITHUB_REPOSITORY,,}"
          export BOT_IMAGE="$image_prefix/classroom-bot:main"
          export WEB_IMAGE="$image_prefix/classroom-web:main"

          test -f .env
          test -f credentials/client_secret.json
          test -f credentials/token.json

          docker compose -f docker/compose.yml --profile prod pull
          docker compose -f docker/compose.yml --profile prod up -d --remove-orphans
          docker compose -f docker/compose.yml --profile prod ps
